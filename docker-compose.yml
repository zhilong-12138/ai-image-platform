version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ai-image-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_image_db
      MYSQL_USER: aiimage
      MYSQL_PASSWORD: aiimage123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ai-image-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-image-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-image-network

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-image-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ai_image_db
      SPRING_DATASOURCE_USERNAME: aiimage
      SPRING_DATASOURCE_PASSWORD: aiimage123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    ports:
      - "8082:8082"
    depends_on:
      - mysql
      - redis
    networks:
      - ai-image-network

  # 用户前端
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: ai-image-frontend-user
    ports:
      - "8080:80"
    networks:
      - ai-image-network

  # 管理后台
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: ai-image-frontend-admin
    ports:
      - "8081:80"
    networks:
      - ai-image-network

  # Nginx 反向代理
  nginx:
    image: nginx:latest
    container_name: ai-image-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend-user
      - frontend-admin
    networks:
      - ai-image-network

volumes:
  mysql_data:
  redis_data:

networks:
  ai-image-network:
    driver: bridge
